backend:
  name: git-gateway
  branch: main # Change this to master if your default branch is master

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "site_data"
    label: "Site Data"
    files:
      - label: "Members List"
        name: "members"
        file: "data/members.json"
        fields:
          - label: "Members"
            name: "members"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Role", name: "role", widget: "string", default: "Member"}
