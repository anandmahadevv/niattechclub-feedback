<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet the Members - NIAT Tech Club</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #ffffff 0%, #f3f4f6 100%);
            color: #111827;
        }

        .member-card {
            background: #ffffff;
            border: 1px solid rgba(229, 231, 235, 0.5);
            border-radius: 16px;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .member-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: rgba(229, 231, 235, 1);
        }
        
        .avatar-gradient {
            background: linear-gradient(135deg, #fca5a5 0%, #b91c1c 100%);
        }
    </style>
</head>
<body class="antialiased font-sans flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="border-b border-gray-200 bg-white/80 backdrop-blur-md sticky top-0 z-50 w-full">
        <div class="mx-auto px-6 md:px-20 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="../logo.png" alt="NIAT Tech Club" class="h-10 object-contain mix-blend-multiply">
                <span class="font-bold tracking-tight text-gray-900 hidden md:block">NIAT Tech Club</span>
            </div>
            <div class="flex items-center gap-4 md:gap-6 text-sm font-medium text-gray-500 overflow-x-auto no-scrollbar">
                <a href="../" class="hover:text-red-700 transition-colors">Home</a>
                <a href="../events/" class="hover:text-red-700 transition-colors">Events</a>
                <a href="../showcase/" class="hover:text-red-700 transition-colors">Showcase</a>
                <a href="./" class="text-red-700 font-semibold">Members</a>
                <a href="../ideas/" class="hover:text-red-700 transition-colors"><i class="fas fa-lightbulb mr-1.5"></i> Ideas</a>
            </div>
        </div>
    </nav>

    <!-- Header Section (Uniform size) -->
    <header class="max-w-4xl mx-auto px-6 pt-16 pb-12 text-center w-full">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-gray-900 mb-4">Meet the 2025-26 Team</h1>
        <p class="text-lg text-gray-500 max-w-2xl mx-auto leading-relaxed">The brilliant minds driving innovation and technology at NIAT Tech Club.</p>
    </header>

    <!-- Members Grid -->
    <main class="max-w-7xl mx-auto px-6 w-full flex-grow">
        <!-- Leadership -->
        <div id="leadership-grid" class="flex flex-col md:flex-row justify-center gap-6 mb-12">
            <!-- Leadership injected by JS -->
        </div>

        <!-- Members -->
        <div id="members-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
            <!-- Members injected by JS -->
        </div>
    </main>

    <script>
        // ----------------------------------------------------------------------
        // DYNAMIC CONTENT: Fetching from Decap CMS JSON database
        // ----------------------------------------------------------------------
        const JSON_DATA_URL = "../data/members.json";

        // Fallback data if JSON fetch fails
        const defaultMembers = [
            {name: "DINESH A", role: "President"},
            {name: "Divya", role: "Vice President"},
            {name: "Anand M", role: "Member"},
            {name: "Darshan Dharmar", role: "Member"},
            {name: "Dhanush Shenoy H", role: "Member"},
            {name: "Raza Abbas Rizwan Haider Rizvi", role: "Member"},
            {name: "Lin Joel Pais", role: "Member"},
            {name: "Akshay Krishna", role: "Member"},
            {name: "Prathik BG", role: "Member"},
            {name: "Madhu K M", role: "Member"},
            {name: "Ajmeera Tharun", role: "Member"},
            {name: "G R HARSHA", role: "Member"},
            {name: "Nidhi Deepak Shetty", role: "Member"},
            {name: "Ajay s m", role: "Member"},
            {name: "Sangam J K", role: "Member"},
            {name: "K K V N Saiteja", role: "Member"},
            {name: "Muhammed sufail M M", role: "Member"},
            {name: "Nishan V", role: "Member"},
            {name: "Samarth Shetty", role: "Member"},
            {name: "Yashas Y", role: "Member"},
            {name: "Surya Narayana c k", role: "Member"},
            {name: "Deekshith k R", role: "Member"},
            {name: "Bindu S H", role: "Member"},
            {name: "Punyashree Y", role: "Member"},
            {name: "Ananya Laxman Naik", role: "Member"}
        ];

        const membersGrid = document.getElementById('members-grid');
        const leadershipGrid = document.getElementById('leadership-grid');

        function renderMembers(membersData) {
            membersGrid.innerHTML = '';
            leadershipGrid.innerHTML = '';

            membersData.forEach(member => {
                const name = member.name || "Unknown";
                const role = member.role || "Member";

                // Create initials (e.g. "Anand M" -> "AM")
                const parts = name.trim().split(' ');
                let initials = parts[0].charAt(0).toUpperCase();
                if (parts.length > 1) {
                    initials += parts[parts.length - 1].charAt(0).toUpperCase();
                }
                
                let roleHtml = `<p class="text-xs text-red-600 font-semibold mt-2 uppercase tracking-wide">${role}</p>`;
                let isLeadership = false;

                const roleLower = role.toLowerCase();
                if (roleLower.includes("president") && !roleLower.includes("vice")) {
                    roleHtml = `<p class="text-xs text-amber-500 font-bold mt-2 uppercase tracking-wide"><i class="fas fa-crown mr-1"></i> ${role}</p>`;
                    isLeadership = true;
                } else if (roleLower.includes("vice president") || roleLower.includes("vp")) {
                    roleHtml = `<p class="text-xs text-blue-600 font-bold mt-2 uppercase tracking-wide"><i class="fas fa-star mr-1"></i> ${role}</p>`;
                    isLeadership = true;
                }

                const card = document.createElement('div');
                
                if (isLeadership) {
                    card.className = 'member-card p-8 flex flex-col items-center text-center w-full md:w-80 shadow-lg border-2 border-red-50';
                    card.innerHTML = `
                        <div class="w-24 h-24 rounded-full avatar-gradient text-white flex items-center justify-center text-3xl font-bold mb-4 shadow-md ring-4 ring-red-50">
                            ${initials}
                        </div>
                        <h3 class="text-xl font-bold text-gray-900 leading-tight">${name}</h3>
                        ${roleHtml}
                    `;
                    leadershipGrid.appendChild(card);
                } else {
                    card.className = 'member-card p-6 flex flex-col items-center text-center';
                    card.innerHTML = `
                        <div class="w-16 h-16 rounded-full avatar-gradient text-white flex items-center justify-center text-xl font-bold mb-4 shadow-md">
                            ${initials}
                        </div>
                        <h3 class="font-bold text-gray-900 leading-tight">${name}</h3>
                        ${roleHtml}
                    `;
                    membersGrid.appendChild(card);
                }
            });
        }

        // Fetch data from the local JSON file managed by the CMS
        fetch(JSON_DATA_URL)
            .then(response => {
                if (!response.ok) {
                    throw new Error("Failed to fetch members.json");
                }
                return response.json();
            })
            .then(data => {
                if (data && data.members && data.members.length > 0) {
                    renderMembers(data.members);
                } else {
                    renderMembers(defaultMembers);
                }
            })
            .catch(error => {
                console.error("Error fetching or parsing members data:", error);
                renderMembers(defaultMembers);
            });
    </script>
    <!-- Global Footer -->
    <footer class="bg-gray-50 border-t border-gray-200 py-12 mt-auto w-full">
        <div class="mx-auto px-6 md:px-20 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-3">
                <img src="../photo.png" alt="NIAT Tech Club" class="h-8 object-contain mix-blend-multiply opacity-50 grayscale hover:grayscale-0 transition-all">
                <span class="text-gray-400 font-semibold text-sm">© 2026 NIAT Tech Club</span>
            </div>
            <div class="flex items-center gap-6 text-gray-400 text-xl">
                <a href="#" class="hover:text-indigo-500 transition-colors" title="Discord"><i class="fab fa-discord"></i></a>
                <a href="#" class="hover:text-pink-500 transition-colors" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" class="hover:text-blue-700 transition-colors" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="#" class="hover:text-gray-900 transition-colors" title="GitHub"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </footer>

</body>
</html>
